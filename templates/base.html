<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NexuSphere{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #F5F1E8;
            min-height: 100vh;
        }
        
        .navbar {
            background: #FFFFFF;
            border-bottom: 2px solid #E8E4DC;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(44, 44, 44, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .navbar-brand {
            font-size: 22px;
            font-weight: 700;
            color: #2C2C2C;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .navbar-brand::before {
            content: '◆';
            font-size: 20px;
            color: #8B7355;
        }
        
        .navbar-menu {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        
        .navbar-links {
            display: flex;
            gap: 24px;
            list-style: none;
        }
        
        .navbar-links a {
            color: #4A4A4A;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.2s ease;
        }
        
        .navbar-links a:hover {
            color: #8B7355;
        }
        
        .navbar-links a.active {
            color: #2C2C2C;
            font-weight: 600;
        }
        
        .navbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info {
            font-size: 14px;
            color: #4A4A4A;
            font-weight: 500;
        }
        
        .btn-logout {
            padding: 10px 20px;
            background: linear-gradient(135deg, #8B7355 0%, #2C2C2C 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        
        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(44, 44, 44, 0.2);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 32px;
        }
        
        .page-header {
            margin-bottom: 32px;
        }
        
        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: #2C2C2C;
            margin-bottom: 8px;
        }
        
        .page-subtitle {
            font-size: 16px;
            color: #4A4A4A;
        }
        
        @media (max-width: 768px) {
            .navbar {
                padding: 16px 20px;
            }
            
            .navbar-menu {
                gap: 16px;
            }
            
            .navbar-links {
                gap: 16px;
            }
            
            .container {
                padding: 24px 20px;
            }
            
            .page-title {
                font-size: 24px;
            }
        }
        
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'dashboard' %}" class="navbar-brand">NexuSphere</a>
        <div class="navbar-menu">
            <ul class="navbar-links">
                <li><a href="{% url 'dashboard' %}" {% if request.resolver_match.url_name == 'dashboard' %}class="active"{% endif %}>Dashboard</a></li>
                <li><a href="{% url 'departments_list' %}" {% if 'departments' in request.path %}class="active"{% endif %}>Departments</a></li>
                <li><a href="{% url 'projects_list' %}" {% if 'projects' in request.path %}class="active"{% endif %}>Projects</a></li>
            </ul>
        </div>
        <div class="navbar-right">
            <span class="user-info">{{ user.username }} ({{ user.role }})</span>
            <a href="{% url 'logout' %}" class="btn-logout">Logout</a>
        </div>
    </nav>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
