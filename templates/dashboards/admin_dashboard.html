<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - NexuSphere</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #F5F1E8;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(139, 115, 85, 0.1) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            animation: float 15s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-50px, 50px); }
        }
        
        .navbar {
            background: #FFFFFF;
            border-bottom: 2px solid #E8E4DC;
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(44, 44, 44, 0.05);
            position: relative;
            z-index: 10;
        }
        
        .navbar-brand {
            font-size: 22px;
            font-weight: 700;
            color: #2C2C2C;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .navbar-brand::before {
            content: '◆';
            font-size: 20px;
            color: #8B7355;
        }
        
        .navbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .user-info {
            font-size: 14px;
            color: #4A4A4A;
            font-weight: 500;
        }
        
        .btn-logout {
            padding: 10px 20px;
            background: linear-gradient(135deg, #8B7355 0%, #2C2C2C 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
        }
        
        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(44, 44, 44, 0.2);
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 48px 32px;
            position: relative;
            z-index: 1;
            animation: fadeIn 0.6s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .welcome-card {
            background: #FFFFFF;
            border-radius: 16px;
            border: 2px solid #E8E4DC;
            padding: 48px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(44, 44, 44, 0.08);
            transition: all 0.3s ease;
        }
        
        .welcome-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(44, 44, 44, 0.12);
        }
        
        .welcome-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #8B7355 0%, #2C2C2C 100%);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .welcome-icon::before {
            content: '👤';
            font-size: 36px;
        }
        
        .welcome-title {
            font-size: 36px;
            font-weight: 700;
            color: #2C2C2C;
            margin-bottom: 16px;
        }
        
        .role-badge {
            display: inline-block;
            padding: 8px 20px;
            background: linear-gradient(135deg, #8B7355 0%, #2C2C2C 100%);
            color: white;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        
        .info-item {
            background: #F5F1E8;
            padding: 24px;
            border-radius: 12px;
            border: 2px solid #E8E4DC;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .info-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, #8B7355 0%, #2C2C2C 100%);
            transition: width 0.3s ease;
        }
        
        .info-item:hover {
            transform: translateX(4px);
            border-color: #8B7355;
        }
        
        .info-item:hover::before {
            width: 8px;
        }
        
        .info-label {
            font-size: 12px;
            font-weight: 600;
            color: #4A4A4A;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        .info-value {
            font-size: 20px;
            font-weight: 700;
            color: #2C2C2C;
        }
        
        @media (max-width: 768px) {
            .navbar {
                padding: 16px 20px;
            }
            
            .container {
                padding: 32px 20px;
            }
            
            .welcome-card {
                padding: 32px 24px;
            }
            
            .welcome-title {
                font-size: 28px;
            }
            
            .info-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">NexuSphere</div>
        <div class="navbar-right">
            <span class="user-info">{{ user.username }}</span>
            <a href="{% url 'logout' %}" class="btn-logout">Logout</a>
        </div>
    </nav>
    
    <div class="container">
        <div class="welcome-card">
            <div class="welcome-icon"></div>
            <h1 class="welcome-title">Welcome, {{ user.first_name|default:user.username }}</h1>
            <div class="role-badge">{{ user.role }}</div>
            
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">Username</div>
                    <div class="info-value">{{ user.username }}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Role</div>
                    <div class="info-value">{{ user.get_role_display }}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Workspace</div>
                    <div class="info-value">{{ workspace }}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Workspace Code</div>
                    <div class="info-value">{{ workspace_code }}</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
