{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NexuSphere</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #F5F1E8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }
        
        /* Animated background shapes */
        body::before,
        body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 20s ease-in-out infinite;
        }
        
        body::before {
            width: 400px;
            height: 400px;
            background: #8B7355;
            top: -100px;
            left: -100px;
            animation-delay: 0s;
        }
        
        body::after {
            width: 300px;
            height: 300px;
            background: #2C2C2C;
            bottom: -80px;
            right: -80px;
            animation-delay: 5s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
            animation: slideUp 0.6s ease;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .login-card {
            background: #FFFFFF;
            border-radius: 16px;
            border: 1px solid #E8E4DC;
            box-shadow: 0 8px 24px rgba(44, 44, 44, 0.08);
            padding: 40px 30px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .login-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(44, 44, 44, 0.12);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #8B7355 0%, #2C2C2C 100%);
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .logo-icon::before {
            content: '◆';
            font-size: 28px;
            color: #FFFFFF;
        }
        
        .logo-text {
            font-size: 28px;
            font-weight: 700;
            color: #2C2C2C;
            margin-bottom: 8px;
        }
        
        .logo-subtitle {
            font-size: 14px;
            color: #4A4A4A;
            font-weight: 500;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #2C2C2C;
            margin-bottom: 8px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E8E4DC;
            border-radius: 10px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: #2C2C2C;
            background: #FFFFFF;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #8B7355;
            background: #F5F1E8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 115, 85, 0.15);
        }
        
        .form-input::placeholder {
            color: #9CA3AF;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px 16px;
            background: linear-gradient(135deg, #8B7355 0%, #2C2C2C 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }
        
        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(44, 44, 44, 0.25);
        }
        
        .btn-login:hover::before {
            left: 100%;
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 20px;
            border: 1px solid;
            animation: shake 0.5s ease;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        
        .alert-error {
            background: #FEF2F2;
            border-color: #FCA5A5;
            color: #991B1B;
        }
        
        .test-credentials {
            margin-top: 32px;
            padding: 20px;
            background: #F5F1E8;
            border-radius: 12px;
            border: 1px solid #E8E4DC;
        }
        
        .test-credentials-title {
            font-size: 13px;
            font-weight: 600;
            color: #2C2C2C;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .test-credential-item {
            font-size: 13px;
            color: #4A4A4A;
            margin-bottom: 6px;
            font-family: 'Courier New', monospace;
        }
        
        .test-credential-item strong {
            color: #2C2C2C;
            font-weight: 600;
        }
        
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 24px;
            }
            
            .logo-text {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon"></div>
                <div class="logo-text">NexuSphere</div>
                <div class="logo-subtitle">Collaboration Platform</div>
            </div>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-error">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
            
            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="workspace_code" class="form-label">Workspace Code</label>
                    <input 
                        type="text" 
                        id="workspace_code" 
                        name="workspace_code" 
                        class="form-input" 
                        placeholder="Enter workspace code"
                        value="{{ workspace_code|default:'' }}"
                        required
                        autofocus
                    >
                </div>
                
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        class="form-input" 
                        placeholder="Enter your username"
                        value="{{ username|default:'' }}"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input" 
                        placeholder="Enter your password"
                        required
                    >
                </div>
                
                <button type="submit" class="btn-login">Sign In</button>
            </form>
            
            {% if debug %}
            <div class="test-credentials">
                <div class="test-credentials-title">Development Test Credentials</div>
                <div class="test-credential-item"><strong>Workspace:</strong> CS</div>
                <div class="test-credential-item"><strong>Username:</strong> admin</div>
                <div class="test-credential-item"><strong>Password:</strong> admin123</div>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
