{% extends 'base_auth.html' %}

{% block title %}Logged Out - NexuSphere{% endblock %}

{% block content %}
<button id="theme-toggle-auth" type="button" aria-label="Toggle theme"
        class="fixed top-4 right-4 z-50 p-2.5 rounded-lg text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 
               hover:bg-gray-200 dark:hover:bg-slate-700 transition-colors">
    <svg id="theme-icon-light-auth" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/>
    </svg>
    <svg id="theme-icon-dark-auth" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
    </svg>
</button>

<div class="w-full max-w-md">
    <div class="bg-white dark:bg-slate-900 rounded-2xl border border-gray-200 dark:border-slate-700 shadow-[0_4px_24px_-4px_rgba(0,0,0,0.1),0_0_0_1px_rgba(0,0,0,0.04)] dark:shadow-[0_4px_24px_-4px_rgba(0,0,0,0.4),0_0_0_1px_rgba(255,255,255,0.06)] p-8 lg:p-10 text-center">
        <div class="inline-flex items-center justify-center w-14 h-14 rounded-full bg-gray-100 dark:bg-slate-700 text-gray-500 dark:text-gray-400 mb-4">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
        </div>
        <h2 class="text-lg font-semibold text-gray-900 dark:text-slate-100 mb-2">Logged Out</h2>
        <p class="text-sm text-gray-600 dark:text-slate-400 mb-6">You have been successfully logged out.</p>
        <a href="{% url 'login' %}" class="inline-block py-3 px-6 bg-indigo-600 text-white text-sm font-semibold rounded-lg hover:bg-indigo-700 transition-colors duration-150">
            Sign In Again
        </a>
    </div>
</div>

<script>
    document.getElementById('theme-toggle-auth').addEventListener('click', function() {
        const html = document.documentElement;
        const isDark = html.classList.toggle('dark');
        localStorage.setItem('nexusphere-theme', isDark ? 'dark' : 'light');
    });
</script>
{% endblock %}
